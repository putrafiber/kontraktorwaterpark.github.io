            <span class="faq-q-text" itemprop="name">Berapa lama proses pembuatan waterpark dari nol?</span>
            <div class="faq-arrow">▼</div>
          </div>
          <div class="faq-answer-text" itemscope itemprop="acceptedAnswer" itemtype="https://schema.org/Answer">
            <div itemprop="text">
              Durasi pembuatan waterpark tergantung skalanya: <strong>Mini waterpark 4–6 bulan</strong>,
              skala kecil 6–8 bulan, skala menengah 8–12 bulan, dan skala besar 12–18 bulan.
              Proses mencakup studi kelayakan, master planning, detail engineering, produksi wahana,
              konstruksi sipil, instalasi sistem MEP, hingga commissioning dan sertifikasi keselamatan.
            </div>
