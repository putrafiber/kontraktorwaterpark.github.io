    }

    .hero-meta span {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* DIRECT ANSWER BOX — AIO / AEO */
    #hero-direct-answer {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: var(--radius-lg);
      padding: 28px 32px;
      text-align: left;
      margin-bottom: 32px;
      animation: fadeUp .6s ease .4s both;
    }

    .answer-label {
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ocean-bright);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .answer-label::before {
      content: '';
      width: 20px; height: 2px;
      background: var(--ocean-bright);
      border-radius: 2px;
    }

    #hero-direct-answer p {
      font-size: 1.05rem;
      color: rgba(255,255,255,0.92);
      line-height: 1.7;
    }

    .price-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .price-chip {
      background: rgba(0, 180, 216, 0.2);
      border: 1px solid rgba(0, 180, 216, 0.4);
      border-radius: 50px;
      padding: 6px 14px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.82rem;
      color: var(--ocean-foam);
      transition: all .2s;
    }

    .price-chip:hover {
      background: rgba(0, 180, 216, 0.35);
      transform: translateY(-1px);
    }

    .hero-cta-group {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeUp .6s ease .5s both;
    }

    .btn-primary {
      background: var(--coral);
      color: var(--white);
      padding: 14px 32px;
      border-radius: 50px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.95rem;
      border: none;
      cursor: pointer;
      transition: all .25s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary:hover {
      background: var(--coral-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(255, 107, 107, 0.45);
      color: var(--white);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.12);
      color: var(--white);
      padding: 14px 28px;
      border-radius: 50px;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.95rem;
      border: 1px solid rgba(255,255,255,0.25);
      cursor: pointer;
      transition: all .25s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-2px);
      color: var(--white);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* STATS STRIP */
    .stats-strip {
      position: relative;
      z-index: 4;
      background: var(--white);
      margin: -1px 0 0;
      padding: 32px 24px;
      box-shadow: var(--shadow-md);
    }

    .stats-grid {
      max-width: 960px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
    }

    .stat-item {
      text-align: center;
      padding: 16px 20px;
      border-right: 1px solid var(--border);
      opacity: 0;
      transform: translateY(20px);
      transition: all .5s ease;
    }

    .stat-item:last-child { border-right: none; }
    .stat-item.visible { opacity: 1; transform: translateY(0); }

    .stat-number {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      color: var(--ocean-mid);
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-family: var(--font-display);
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ═══════════════════════════════════════════════
       MAIN CONTENT
    ═══════════════════════════════════════════════ */
    .main-content {
      position: relative;
      z-index: 3;
      max-width: 900px;
      margin: 0 auto;
      padding: 64px 24px;
    }

    /* Section dividers */
    .wave-divider {
      width: 100%;
      overflow: hidden;
      line-height: 0;
    }

    /* SECTION HEADER */
    .section-header {
      margin-bottom: 40px;
      opacity: 0;
      transform: translateY(20px);
      transition: all .5s ease;
    }

    .section-header.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .section-tag {
      display: inline-block;
      background: linear-gradient(135deg, rgba(0,180,216,0.15), rgba(0,119,182,0.1));
      border: 1px solid rgba(0, 180, 216, 0.3);
      color: var(--ocean-mid);
      padding: 4px 14px;
      border-radius: 50px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .section-header h2 {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      letter-spacing: -0.03em;
      color: var(--ocean-deep);
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .section-header p {
      font-size: 1.05rem;
      color: var(--text-mid);
      max-width: 620px;
    }

    /* ═══════════════════════════════════════════════
       PRICE SECTION - KEY FACTS (AIO)
    ═══════════════════════════════════════════════ */
    #key-price-summary {
      background: linear-gradient(135deg, var(--ocean-deep), #005F99);
      border-radius: var(--radius-lg);
      padding: 40px 36px;
      margin-bottom: 56px;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(24px);
      transition: all .5s ease;
    }

    #key-price-summary.visible { opacity: 1; transform: translateY(0); }

    #key-price-summary::after {
      content: '💧';
      position: absolute;
      right: -10px; top: -20px;
      font-size: 120px;
      opacity: 0.06;
      transform: rotate(-15deg);
      pointer-events: none;
    }

    .price-summary-title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.3rem;
      color: var(--white);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .price-summary-title::before {
      content: '';
      width: 4px; height: 24px;
      background: var(--ocean-bright);
      border-radius: 2px;
    }

    .scale-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
    }

    .scale-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius);
      padding: 18px 16px;
      transition: all .25s;
      cursor: default;
    }

    .scale-card:hover {
      background: rgba(255,255,255,0.13);
      transform: translateY(-3px);
      border-color: rgba(0, 180, 216, 0.5);
    }

    .scale-name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ocean-bright);
      margin-bottom: 6px;
    }

    .scale-price {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.2rem;
      color: var(--white);
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .scale-detail {
      font-size: 0.76rem;
      color: rgba(255,255,255,0.55);
      font-family: var(--font-display);
      line-height: 1.4;
    }

    /* ═══════════════════════════════════════════════
       BREAKDOWN TABLE
    ═══════════════════════════════════════════════ */
    .table-wrapper {
      overflow-x: auto;
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      margin-bottom: 48px;
      opacity: 0;
      transform: translateY(20px);
      transition: all .5s ease;
    }

    .table-wrapper.visible { opacity: 1; transform: translateY(0); }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--white);
      font-family: var(--font-display);
      font-size: 0.88rem;
    }

    thead tr {
      background: linear-gradient(135deg, var(--ocean-deep), var(--ocean-mid));
      color: var(--white);
    }

    thead th {
      padding: 14px 18px;
      text-align: left;
      font-weight: 700;
      letter-spacing: 0.03em;
      font-size: 0.82rem;
      text-transform: uppercase;
    }

    tbody tr {
      border-bottom: 1px solid rgba(0, 119, 182, 0.08);
      transition: background .15s;
    }

    tbody tr:hover { background: rgba(0, 180, 216, 0.05); }

    tbody tr:last-child { border-bottom: none; }

    td {
      padding: 13px 18px;
      color: var(--text-mid);
      vertical-align: middle;
    }

    td:first-child {
      font-weight: 600;
      color: var(--ocean-deep);
    }

    td:last-child {
      text-align: right;
    }

    .badge-percent {
      display: inline-block;
      background: rgba(0, 180, 216, 0.12);
      color: var(--ocean-mid);
      padding: 2px 8px;
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 700;
    }

    tfoot tr {
      background: linear-gradient(135deg, rgba(0,61,107,0.07), rgba(0,119,182,0.05));
    }

    tfoot td {
      font-weight: 800;
      color: var(--ocean-deep) !important;
      font-size: 0.95rem;
      border-top: 2px solid rgba(0, 119, 182, 0.2);
    }

    /* ═══════════════════════════════════════════════
       WAHANA PRICE CARDS
    ═══════════════════════════════════════════════ */
    .wahana-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
      margin-bottom: 56px;
    }

    .wahana-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 22px 20px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      transition: all .28s ease;
      opacity: 0;
      transform: translateY(20px);
      cursor: default;
    }

    .wahana-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .wahana-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-lg);
      border-color: rgba(0, 180, 216, 0.4);
    }

    .wahana-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--ocean-pale), rgba(0,180,216,0.15));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin-bottom: 12px;
    }

    .wahana-name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--ocean-deep);
      margin-bottom: 6px;
    }

    .wahana-price {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.15rem;
      color: var(--coral);
      margin-bottom: 6px;
    }

    .wahana-specs {
      font-size: 0.78rem;
      color: var(--text-light);
      font-family: var(--font-display);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .wahana-spec {
      background: rgba(0,180,216,0.08);
      padding: 2px 8px;
      border-radius: 50px;
    }

    /* ═══════════════════════════════════════════════
       LOCATION SECTION
    ═══════════════════════════════════════════════ */
    .location-section {
      background: linear-gradient(135deg, #F0FAFE, #E3F7FD);
      border-radius: var(--radius-lg);
      padding: 48px 40px;
      margin-bottom: 56px;
      border: 1px solid rgba(0, 180, 216, 0.2);
      opacity: 0;
      transform: translateY(20px);
      transition: all .5s ease;
    }

    .location-section.visible { opacity: 1; transform: translateY(0); }

    .location-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 36px;
      align-items: start;
    }

    .location-info h3 {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.4rem;
      color: var(--ocean-deep);
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    .location-info p {
      color: var(--text-mid);
      margin-bottom: 14px;
      font-size: 0.97rem;
    }

    .location-detail {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 0;
      border-top: 1px solid rgba(0,119,182,0.1);
    }

    .location-detail:first-of-type { border-top: none; }

    .loc-icon {
      width: 36px; height: 36px;
      background: var(--ocean-mid);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .loc-text strong {
      display: block;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--ocean-mid);
      margin-bottom: 2px;
    }

    .loc-text span {
      font-size: 0.9rem;
      color: var(--text-mid);
    }

    .map-placeholder {
      background: linear-gradient(135deg, var(--ocean-deep), var(--ocean-mid));
      border-radius: var(--radius);
      overflow: hidden;
      aspect-ratio: 4/3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      position: relative;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 40% 40%, rgba(0,180,216,0.3), transparent 50%),
        radial-gradient(circle at 70% 70%, rgba(6,214,160,0.2), transparent 40%);
    }

    .map-pin {
      font-size: 48px;
      position: relative;
      z-index: 1;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .map-text {
      font-family: var(--font-display);
      font-weight: 700;
      color: var(--white);
      text-align: center;
      font-size: 0.9rem;
      position: relative;
      z-index: 1;
      padding: 0 20px;
    }

    .map-sub {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.7);
      text-align: center;
      font-family: var(--font-display);
      position: relative;
      z-index: 1;
    }

    /* ═══════════════════════════════════════════════
       PRODUCTION PROCESS STEPS
    ═══════════════════════════════════════════════ */
    .process-section {
      margin-bottom: 64px;
    }

    .steps-timeline {
      position: relative;
      padding-left: 32px;
    }

    .steps-timeline::before {
      content: '';
      position: absolute;
      left: 15px; top: 0; bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, var(--ocean-bright), var(--lime));
    }

    .step-item {
      position: relative;
      padding: 0 0 36px 28px;
      opacity: 0;
      transform: translateX(-20px);
      transition: all .5s ease;
    }

    .step-item.visible { opacity: 1; transform: translateX(0); }

    .step-item:last-child { padding-bottom: 0; }

    .step-dot {
      position: absolute;
      left: -24px; top: 2px;
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--ocean-mid), var(--ocean-bright));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 0.82rem;
      color: var(--white);
      box-shadow: 0 0 0 4px rgba(0, 180, 216, 0.2);
    }

    .step-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .step-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1rem;
      color: var(--ocean-deep);
    }

    .step-duration {
      background: rgba(6, 214, 160, 0.15);
      color: var(--lime);
      padding: 2px 10px;
      border-radius: 50px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.72rem;
      border: 1px solid rgba(6, 214, 160, 0.3);
    }

    .step-desc {
      font-size: 0.93rem;
      color: var(--text-mid);
      line-height: 1.65;
    }

    /* ═══════════════════════════════════════════════
       ROI PROJECTION CHART
    ═══════════════════════════════════════════════ */
    .roi-section {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 40px 36px;
      box-shadow: var(--shadow-md);
      margin-bottom: 56px;
      border: 1px solid var(--border);
      opacity: 0;
      transform: translateY(20px);
      transition: all .5s ease;
    }

    .roi-section.visible { opacity: 1; transform: translateY(0); }

    .roi-bars {
      margin-top: 28px;
    }

    .roi-bar-row {
      display: grid;
      grid-template-columns: 70px 1fr 100px;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
    }

    .roi-year {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.82rem;
      color: var(--text-light);
      text-align: right;
    }

    .roi-track {
      background: rgba(0,180,216,0.08);
      border-radius: 50px;
      height: 28px;
      overflow: hidden;
    }

    .roi-fill {
      height: 100%;
      border-radius: 50px;
      background: linear-gradient(90deg, var(--ocean-mid), var(--ocean-bright));
      width: 0;
      transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
      display: flex;
      align-items: center;
      padding-left: 12px;
    }

    .roi-fill.bep {
      background: linear-gradient(90deg, var(--lime), #04c28a);
    }

    .roi-fill-label {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.75rem;
      color: var(--white);
      white-space: nowrap;
    }

    .roi-value {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.88rem;
      color: var(--ocean-deep);
      text-align: right;
    }

    .roi-bep-tag {
      display: inline-block;
      background: var(--lime);
      color: var(--white);
      padding: 2px 10px;
      border-radius: 50px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.7rem;
      margin-left: 4px;
    }

    /* ═══════════════════════════════════════════════
       CHECKLIST
    ═══════════════════════════════════════════════ */
    .checklist-section {
      background: linear-gradient(135deg, rgba(255, 209, 102, 0.12), rgba(255, 107, 107, 0.06));
      border-radius: var(--radius-lg);
      padding: 40px 36px;
      border: 1px solid rgba(255, 209, 102, 0.3);
      margin-bottom: 56px;
      opacity: 0;
      transform: translateY(20px);
      transition: all .5s ease;
    }

    .checklist-section.visible { opacity: 1; transform: translateY(0); }

    .checklist-title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.4rem;
      color: var(--ocean-deep);
      margin-bottom: 24px;
      letter-spacing: -0.02em;
    }

    .checklist {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
      list-style: none;
    }

    .checklist li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: 0.93rem;
      color: var(--text-mid);
    }

    .check-icon {
      width: 22px; height: 22px;
      background: linear-gradient(135deg, var(--ocean-mid), var(--ocean-bright));
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ═══════════════════════════════════════════════
       FAQ SECTION
    ═══════════════════════════════════════════════ */
    .faq-section {
      margin-bottom: 64px;
    }

    .faq-item {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      opacity: 0;
      transform: translateY(16px);
      transition: opacity .4s ease, transform .4s ease, box-shadow .25s;
    }

    .faq-item.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .faq-item:hover { box-shadow: var(--shadow-md); }
    .faq-item.open { border-color: rgba(0, 180, 216, 0.4); }

    .faq-question {
      padding: 18px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      gap: 16px;
    }

    .faq-q-text {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--ocean-deep);
      flex: 1;
    }

    .faq-arrow {
      width: 32px; height: 32px;
      background: rgba(0, 180, 216, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all .25s;
      font-size: 14px;
