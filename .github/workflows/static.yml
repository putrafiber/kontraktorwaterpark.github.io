    .bubble:nth-child(8)  { width: 14px; height: 14px; left: 82%;  animation-duration: 7s;  animation-delay: 3.5s; }
    .bubble:nth-child(9)  { width: 22px; height: 22px; left: 90%;  animation-duration: 11s; animation-delay: 0.5s; }
    .bubble:nth-child(10) { width: 32px; height: 32px; left: 96%;  animation-duration: 14s; animation-delay: 2.5s; }

    @keyframes rise {
      0%   { transform: translateY(0) translateX(0) scale(1);   opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
