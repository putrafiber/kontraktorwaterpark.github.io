            <span class="faq-q-text" itemprop="name">Berapa luas lahan minimal untuk membangun waterpark?</span>
            <div class="faq-arrow">▼</div>
          </div>
          <div class="faq-answer-text" itemscope itemprop="acceptedAnswer" itemtype="https://schema.org/Answer">
            <div itemprop="text">
              Luas lahan minimal untuk mini waterpark (2–3 wahana) adalah sekitar <strong>1.000–1.500 m²</strong>.
              Untuk pengalaman yang lebih lengkap dan menarik pengunjung dari jarak jauh, direkomendasikan minimal 3.000 m².
              Semakin luas lahan, semakin banyak wahana yang bisa dibangun, sehingga daya tarik dan potensi pendapatan semakin besar.
            </div>
