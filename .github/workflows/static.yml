  <script>
    // ── INTERSECTION OBSERVER — Scroll Reveal
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry, i) => {
        if (entry.isIntersecting) {
          const delay = entry.target.dataset.delay || 0;
          setTimeout(() => {
            entry.target.classList.add('visible');
          }, delay);
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });

    // Observe all animatable elements
    document.querySelectorAll(
      '.section-header, .table-wrapper, .wahana-card, .step-item, ' +
      '.location-section, .roi-section, .checklist-section, .author-box, ' +
      '.faq-item, #key-price-summary'
    ).forEach((el, i) => {
      el.dataset.delay = Math.min(i * 60, 300);
      observer.observe(el);
    });

    // Stats items with stagger
    document.querySelectorAll('.stat-item').forEach((el, i) => {
      el.dataset.delay = i * 120;
      observer.observe(el);
    });

    // ── COUNTER ANIMATION
    function animateCounter(el) {
      const target = parseFloat(el.dataset.target);
      const prefix = el.dataset.prefix || '';
      const suffix = el.dataset.suffix || '';
      const isFloat = target % 1 !== 0;
      const duration = 1600;
      const start = performance.now();

      function update(now) {
        const progress = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = eased * target;
        el.textContent = prefix + (isFloat ? current.toFixed(1) : Math.round(current)) + suffix;
        if (progress < 1) requestAnimationFrame(update);
      }
      requestAnimationFrame(update);
    }

    const counterObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          animateCounter(entry.target);
          counterObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.5 });

    document.querySelectorAll('.stat-number[data-target]').forEach(el => {
      counterObserver.observe(el);
    });

    // ── ROI BAR ANIMATION
    const roiObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          document.querySelectorAll('.roi-fill').forEach((bar, i) => {
            setTimeout(() => {
              bar.style.width = bar.dataset.width + '%';
            }, i * 200);
          });
          roiObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.3 });

    const roiSection = document.getElementById('roi-section');
    if (roiSection) roiObserver.observe(roiSection);

    // ── FAQ ACCORDION
    document.querySelectorAll('.faq-question').forEach(btn => {
      btn.addEventListener('click', () => {
        const item = btn.closest('.faq-item');
        const isOpen = item.classList.contains('open');

        // Close all
        document.querySelectorAll('.faq-item.open').forEach(el => {
          el.classList.remove('open');
          el.querySelector('.faq-question').setAttribute('aria-expanded', 'false');
        });

        // Open clicked if it was closed
        if (!isOpen) {
          item.classList.add('open');
          btn.setAttribute('aria-expanded', 'true');
        }
      });

      // Keyboard accessibility
      btn.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          btn.click();
        }
      });
    });

    // ── OPEN FIRST FAQ ON LOAD
    setTimeout(() => {
      const firstFaq = document.querySelector('.faq-item');
      if (firstFaq) {
        firstFaq.classList.add('open');
        firstFaq.querySelector('.faq-question').setAttribute('aria-expanded', 'true');
      }
    }, 800);

    // ── SMOOTH SCROLL for anchor links
    document.querySelectorAll('a[href^="#"]').forEach(a => {
      a.addEventListener('click', e => {
        const target = document.querySelector(a.getAttribute('href'));
        if (target) {
          e.preventDefault();
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
    });

    // ── WAHANA CARDS stagger
    document.querySelectorAll('.wahana-card').forEach((card, i) => {
      card.style.transitionDelay = (i * 50) + 'ms';
    });
  </script>

</body>
</html>
