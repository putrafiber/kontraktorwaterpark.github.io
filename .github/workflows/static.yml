            <span class="faq-q-text" itemprop="name">Berapa lama investasi waterpark bisa balik modal (BEP)?</span>
            <div class="faq-arrow">▼</div>
          </div>
          <div class="faq-answer-text" itemscope itemprop="acceptedAnswer" itemtype="https://schema.org/Answer">
            <div itemprop="text">
              Berdasarkan proyeksi konservatif untuk waterpark skala menengah (investasi Rp 8 miliar),
              break-even point (BEP) tercapai di <strong>pertengahan tahun ke-4</strong> dengan occupancy rate ~60%.
              Internal Rate of Return (IRR) berkisar <strong>24–28%</strong> — angka yang sangat sehat untuk industri hiburan dan hospitality.
            </div>
          </div>
        </div>

        <div class="faq-item" itemscope itemprop="mainEntity" itemtype="https://schema.org/Question">
