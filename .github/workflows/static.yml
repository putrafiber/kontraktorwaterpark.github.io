    <!-- ── SECTION 5: PROSES PRODUKSI (HOWTO) ── -->
    <section class="process-section" aria-labelledby="s5-heading">
      <div class="section-header">
        <span class="section-tag">🔧 Proses Produksi</span>
        <h2 id="s5-heading">7 Tahap Proses Pembuatan Waterpark dari Nol</h2>
        <p>Setiap proyek yang dikerjakan secara profesional melewati tujuh fase ini — tidak ada jalan pintas yang aman.</p>
      </div>

      <div class="steps-timeline">
        <div class="step-item">
          <div class="step-dot">1</div>
          <div class="step-header">
            <div class="step-title">Studi Kelayakan (Feasibility Study)</div>
            <span class="step-duration">2–4 Minggu</span>
          </div>
          <p class="step-desc">
            Analisis <em>catchment area</em>, demografi pengunjung, pemetaan kompetitor, kondisi lahan, dan financial modeling
            lengkap dengan proyeksi cashflow 10 tahun. Fase ini menentukan apakah investasi layak dilanjutkan.
          </p>
        </div>

        <div class="step-item">
          <div class="step-dot">2</div>
          <div class="step-header">
            <div class="step-title">Master Planning &amp; Desain Konsep</div>
            <span class="step-duration">4–6 Minggu</span>
          </div>
          <p class="step-desc">
            Pembuatan site plan, zonasi (area basah vs. kering, zona anak vs. dewasa, F&B), analisis flow pengunjung,
            rendering 3D fotorealistis, dan preliminary Bill of Quantity (BoQ).
          </p>
        </div>

        <div class="step-item">
          <div class="step-dot">3</div>
          <div class="step-header">
            <div class="step-title">Detail Engineering Design</div>
            <span class="step-duration">4–8 Minggu</span>
          </div>
          <p class="step-desc">
            Kalkulasi struktural wahana dan fondasi, desain hidrolik (debit air, head loss, pump sizing),
            pool engineering (water turnover rate standar 4–6 jam), sizing filtrasi, dan kalkulasi beban elektrikal.
          </p>
        </div>

        <div class="step-item">
          <div class="step-dot">4</div>
          <div class="step-header">
            <div class="step-title">Produksi Wahana Fiberglass di Workshop</div>
            <span class="step-duration">8–16 Minggu</span>
          </div>
          <p class="step-desc">
            Proses mold preparation → aplikasi gelcoat 0,5–0,8 mm → laminasi serat kaca + resin (total ketebalan 6–12 mm)
            → curing 24–48 jam → demolding → finishing → QC inspection (uji ketebalan, visual, dan beban).
          </p>
        </div>

        <div class="step-item">
          <div class="step-dot">5</div>
          <div class="step-header">
            <div class="step-title">Konstruksi Sipil di Lokasi</div>
            <span class="step-duration">8–16 Minggu</span>
          </div>
          <p class="step-desc">
            Pekerjaan fondasi, pembangunan kolam, bangunan pendukung (loker, toilet, area F&B), parking area,
            dan semua infrastruktur fisik yang berjalan paralel dengan produksi wahana.
          </p>
        </div>

        <div class="step-item">
          <div class="step-dot">6</div>
          <div class="step-header">
            <div class="step-title">Instalasi Wahana &amp; Sistem MEP</div>
            <span class="step-duration">4–8 Minggu</span>
          </div>
          <p class="step-desc">
            Assembly wahana fiberglass di lokasi, pemasangan sistem pompa dan filtrasi, instalasi lighting dan
            sistem kontrol panel, serta integrasi semua komponen mekanikal-elektrikal-plumbing.
          </p>
        </div>

        <div class="step-item">
          <div class="step-dot">7</div>
          <div class="step-header">
            <div class="step-title">Commissioning &amp; Grand Opening</div>
            <span class="step-duration">2–4 Minggu</span>
          </div>
          <p class="step-desc">
            Full testing semua sistem, sertifikasi keselamatan (SNI 8527:2018, ASTM F2376), pelatihan staf,
            soft opening terbatas, hingga resmi grand opening.
          </p>
        </div>
      </div>
    </section>

